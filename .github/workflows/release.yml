name: Build and Release Module

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(grep '^version=' module.prop | cut -d'=' -f2)
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build module zip
        run: |
          ZIP_NAME="liboemcrypto-disabler.zip"
          zip -r "${ZIP_NAME}" . \
            -x ".git/*" \
            -x ".github/*" \
            -x "README.md" \
            -x "CHANGELOG.md" \
            -x "LICENSE" \
            -x "update.json" \
            -x "*.zip"

          echo "Built ${ZIP_NAME}:"
          unzip -l "${ZIP_NAME}"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: liboemcrypto-disabler.zip
          name: ${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Install

            1. Download `liboemcrypto-disabler.zip` below
            2. Flash via Magisk / KernelSU / APatch Manager
            3. Reboot
            4. Clear data on your streaming app and test

            See the [README](https://github.com/${{ github.repository }}#installation) for full instructions.
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Upload artifact (for manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: liboemcrypto-disabler
          path: liboemcrypto-disabler.zip
